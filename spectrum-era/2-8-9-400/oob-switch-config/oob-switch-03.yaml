- set:
    bridge:
      domain:
        br_default:
          vlan:
            '200': {}
    interface:
      eth0:
        ip:
          address:
            dhcp: {}
          vrf: mgmt
        type: eth
      spine_bond:
        bond:
          member:
            swp49: {}
            swp50: {}
            swp51: {}
            swp52: {}
        type: bond
      spine_bond,swp1-5,25-34,36-41,45,47,53-57,60-61:
        bridge:
          domain:
            br_default:
              access: 200
      swp1-5,25-34,36-41,45,47,49-57,60-61:
        link:
          state:
            up: {}  
      swp1-5,25-34,36-41,45,47,53-57,60-61:
        type: swp  
      vlan200:
        ip:
          address:
            192.168.220.2/24: {}
        type: svi
        vlan: 200
    system:
      message:
        post-login: |
          #####################################################################################
          #                     You are successfully logged in to: oob-switch-03              #
          #####################################################################################
        pre-login: |
          #####################################################################################
          #  Welcome to NVIDIA Cumulus VX (TM)                                                #
          #  NVIDIA Cumulus VX (TM) is a community supported virtual appliance designed       #
          #  for experiencing, testing and prototyping NVIDIA Cumulus'"'"' latest technology. #
          #  For any questions or technical support, visit our community site at:             #
          #  https://www.nvidia.com/en-us/support                                             #
          #####################################################################################
      hostname: oob-switch-03
      ssh-server:
        state: enabled
      timezone: Etc/Zulu
    vrf:
      default:
        router:
          static:
            0.0.0.0/0:
              address-family: ipv4-unicast
              via:
                192.168.220.1:
                  type: ipv4-address
